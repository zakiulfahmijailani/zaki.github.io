name: Newsletter Broadcaster

on:
  push:
    branches: [main]
    paths:
      - 'newsletter/posts/*.md'

  workflow_dispatch:
    inputs:
      subject:
        description: 'Email subject (override auto-detect)'
        required: false
        default: ''

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests markdown

      - name: Broadcast newsletter & check subscriber limit
        env:
          MAILERLITE_API_TOKEN: ${{ secrets.MAILERLITE_API_TOKEN }}
          MAILERLITE_GROUP_ID: '187996210554996591'
          NOTIFY_EMAIL: 'zakiul.jailani@bakrie.ac.id'
          SUBSCRIBER_LIMIT: '1000'
          NOTIFY_THRESHOLD: '900'
          MANUAL_SUBJECT: ${{ github.event.inputs.subject }}
        run: python scripts/newsletter_broadcast.py
